version = 1

[models.coordinator]
model = "gpt-5.2"
reasoning_effort = "xhigh"

[models.sidecar]
model = "gpt-5.1-codex-mini"
reasoning_effort = "low"

[models.verifier]
model = "gpt-5.3-codex"
reasoning_effort = "medium"

[privacy]
telemetry = "product-improvement"

[issue-relay]
mode = "issue-review"

[packs]
core = true
caveman = true
rtk = true
frontend-craft = true
docs-craft = true

[lifecycle-hooks]
tokscale-submit = true
tokscale-dry-run = false
rate-limit-resume = true

[updates]
auto = true

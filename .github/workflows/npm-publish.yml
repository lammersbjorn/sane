name: NPM Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (for example v1.0.0-beta.1)"
        required: true
        type: string
      npm_tag:
        description: "npm dist-tag to publish under"
        required: true
        default: "beta"
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: npm-publish
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release package
        run: pnpm run release:verify

      - name: Validate npm token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "NPM_TOKEN secret missing. Configure repository or environment secret before publishing."
            exit 1
          fi

      - name: Validate npm dist-tag
        run: |
          set -euo pipefail
          if [[ "${{ inputs.tag }}" == *-* && "${{ inputs.npm_tag }}" == "latest" ]]; then
            echo "Prerelease tags must not publish under npm latest."
            exit 1
          fi

      - name: Publish sane-codex package
        working-directory: apps/sane-tui/dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --no-git-checks --provenance --tag "${{ inputs.npm_tag }}"

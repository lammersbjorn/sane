name: NPM Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (for example v1.0.0-beta.1)"
        required: true
        type: string
      npm_tag:
        description: "npm dist-tag to publish under"
        required: true
        default: "beta"
        type: string

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: npm-publish
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Setup npm for trusted publishing
        run: npm install --global npm@11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release package
        run: pnpm run accept

      - name: Validate npm dist-tag
        run: |
          set -euo pipefail
          if [[ "${{ inputs.tag }}" == *-* && "${{ inputs.npm_tag }}" == "latest" ]]; then
            echo "Prerelease tags must not publish under npm latest."
            exit 1
          fi

      - name: Publish sane-codex package
        working-directory: apps/sane-tui/dist
        run: npm publish --access public --tag "${{ inputs.npm_tag }}"

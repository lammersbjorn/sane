name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release package
        run: pnpm run accept

      - name: Collect artifacts
        run: |
          set -euo pipefail
          mkdir -p artifacts tmp
          TGZ_PATH="$(ls apps/sane-tui/dist/*.tgz | head -n1)"
          TGZ_FILE="$(basename "$TGZ_PATH")"
          TGZ_BASE="${TGZ_FILE%.tgz}"
          cp "$TGZ_PATH" "artifacts/$TGZ_FILE"

          tar -xzf "$TGZ_PATH" -C tmp
          (
            cd tmp/package
            zip -r "../../artifacts/${TGZ_BASE}.zip" .
          )

          sha256sum artifacts/* > artifacts/SHA256SUMS.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sane-release-artifacts
          path: artifacts/

      - name: Attach assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: |
            artifacts/*.tgz
            artifacts/*.zip
            artifacts/SHA256SUMS.txt
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ contains(github.ref_name, '-') && 'false' || 'true' }}

  trigger-homebrew-tap-update:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate Homebrew tap token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN secret missing. Add a token that can dispatch workflows in lammersbjorn/homebrew-sane."
            exit 1
          fi

      - name: Trigger Homebrew tap updater
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          gh workflow run update-sane-formula.yml \
            --repo lammersbjorn/homebrew-sane \
            --ref main
